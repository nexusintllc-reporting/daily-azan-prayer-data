name: Auto-Update Prayer Times

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run scraper
        shell: pwsh
        run: |
          .\scripts\scrape_all_67_cities.ps1
      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || (git commit -m "Auto-update: $(date +'%B %Y')" && git push)