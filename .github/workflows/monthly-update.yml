name: Monthly Prayer Times Update

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run scraper
        shell: pwsh
        run: |
          ./scripts/scrape_all_cities.ps1
      
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || (git commit -m "Auto-update prayer times" && git push)
